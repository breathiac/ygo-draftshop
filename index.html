<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Shop</title>

<style>

@font-face {
    font-family: "ticker-font";
    src: url("tickerfont.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
}

/* =====================
   MAIN CONTENT AREA
===================== */
#main-content {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;

    /* subtract space for bottom UI */
    height: calc(100% - 60px - 140px);

    display: flex;
    flex-direction: column;
}

/* =====================
   TAB BAR
===================== */
#tab-bar {
    display: flex;
    background: rgba(0, 0, 0, 0.7);
    border-bottom: 2px solid #444;
}

.tab {
    flex: 1;
    padding: 10px;

    background: transparent;
    border: none;
    color: white;

    cursor: pointer;
    font-size: 14px;
}

.tab.active {
    background: rgba(255, 255, 255, 0.1);
    border-bottom: 2px solid #888;
}

/* =====================
   TAB CONTENT
===================== */
#tab-content {
    flex: 1;
    position: relative;

    min-height: 0; /* THIS FIXES SCROLLING */
}

/* Panels */
.tab-panel {
    display: none;
    height: 100%;
}

.tab-panel.active {
    display: block;
}

/* =====================
   SCROLLABLE LIST
===================== */
.list {
    height: 100%;
    overflow-y: auto;
    padding: 10px;

    display: flex;
    flex-direction: column;
    gap: 10px;
	padding-bottom: 18vh;

}

/* Items */
.list-item {
    padding: 12px;

    background: rgba(0, 0, 0, 0.6);
    border: 0px solid #555;
    border-radius: 8px;

    cursor: pointer;
}

.list-item:hover {
    background: rgba(255, 255, 255, 0.1);
}

/* =====================
   TOP MENU BAR
===================== */
#top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;

    height: 60px;
    z-index: 1000; /* always above everything */

    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(6px);
	
	    /* image layer */
    background-image: url("img/chips.png");
    background-repeat: repeat-x; /* or no-repeat depending on your asset */
    background-size: cover;
    background-position: center;
	
	
    border-bottom: 2px solid #444;

    display: flex;
    align-items: center;
}

.top-bar-inner {
    width: 100%;
    padding: 0 12px;

    display: flex;
    justify-content: space-between;
    align-items: center;
}

.top-left {
    font-size: 18px;
	font-style: italic;
    font-weight: bold;
}

.top-right {
    display: flex;
    gap: 10px;
}

#test-dialogue-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 0px solid #555;
    color: white;

    padding: 6px 10px;
    border-radius: 6px;

    cursor: pointer;
    font-size: 14px;
}

#test-dialogue-btn:hover {
    background: rgba(255, 255, 255, 0.2);
}



html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* =====================
   BACKGROUND (JS SCROLLED TILE)
===================== */
#background {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;

    background-image: url("img/shop_bg6.png");
    background-repeat: repeat;
}

/* MAIN UI CONTAINER */
#shopkeeper-container {
    position: fixed;
    bottom: 2vh;
    left: 2vw;

    display: flex;
    flex-direction: row;
    align-items: flex-end;
    gap: 3vw;

    max-width: 95vw;
}

/* AVATAR WRAPPER */
#shopkeeper-wrapper {
    position: relative;
    width: 22vw;
    max-width: 140px;
    aspect-ratio: 1 / 1;
    cursor: pointer;

    border: 0px solid #555;
    border-radius: 8px;
    background: rgba(0,0,0,0.3);
    padding: 4px;
    box-sizing: border-box;
}

.shopkeeper-img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    transition: transform 0.2s;
}

#idle { z-index: 1; }
#talking { z-index: 2; }

#shopkeeper-wrapper:hover .shopkeeper-img {
    transform: scale(1.05);
}

/* DIALOGUE BOX */
#dialogue-box {
    width: 60vw;
    max-width: 260px;
    min-height: 60px;

    background-image: url("img/text_bg.png");
    background-size: cover;
    background-position: center;

    position: relative;

    border: 0px solid #555;
    border-radius: 10px;
    padding: 10px;

    display: none;

    flex: 0 0 auto;

    opacity: 0;
    transform: translateX(20px);
    transition: opacity 0.25s ease, transform 0.25s ease;
}

#dialogue-box::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
    z-index: 0;
}

#dialogue-text {
    position: relative;
    z-index: 1;
    font-size: clamp(12px, 3.5vw, 16px);
    line-height: 1.4;
}

#dialogue-box.show {
    opacity: 1;
    transform: translateX(0);
}

.card {
    display: flex;
    align-items: center;
    width: 93%;
}

.card-info {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
}

.buy-btn {
    flex-shrink: 0;
}

/* LEFT ICON */
.card-icon {
    width: 28px;
    height: 28px;

    object-fit: contain;

    flex-shrink: 0;

    border-radius: 4px;
    border: 0px solid #444;
    background: rgba(0,0,0,0.3);
}

.card-name {
    font-weight: 700;   /* bold */
    font-size: 14px;
    letter-spacing: 0.3px;
}

.card-stats {
    font-size: 13px;    /* slightly smaller */
    opacity: 0.75;
}

.counter-container {
    display: flex;
    align-items: center;
    gap: 8px;
}

/* Buttons */
.counter-container button {
    width: 28px;
    height: 28px;

    background: rgba(255, 255, 255, 0.1);
    border: 0px solid #555;
    color: white;

    border-radius: 6px;
    cursor: pointer;

    font-size: 16px;
    font-weight: bold;
    line-height: 1;
}

.counter-container button:hover {
    background: rgba(255, 255, 255, 0.2);
}

/* Counter number */
#counter-value {
    font-size: 75px;   /* 👈 increase this */
    font-weight: 800;

    min-width: 20px;
    text-align: center;

    padding: 6px 10px;
    border-radius: 6px;

    user-select: none;
    touch-action: none;

    cursor: grab;
}

#counter-value:active {
    cursor: grabbing;
}

.buy-btn {
    background: none;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    padding: 4px 6px;
    font-size: 25px;
    transition: transform 0.15s ease, opacity 0.15s ease;
}

/* unavailable (not enough chips) */
.buy-btn.disabled {
    opacity: 0.4;
    cursor: default;
}

/* sold out */
.buy-btn.sold-out {
    opacity: 0.25;
    cursor: default;
    text-decoration: line-through;
}

/* can buy state */
.buy-btn.can-buy {
    color: #7CFF7C;
    animation: pulseBuy 1.6s ease-in-out infinite;
}

/* subtle pulse */
@keyframes pulseBuy {
    0%   { transform: scale(1);   opacity: 1; }
    50%  { transform: scale(1.2); opacity: 0.85; }
    100% { transform: scale(1);   opacity: 1; }
}

.list-item.owned {
    background: rgba(100, 255, 100, 0.2);
}

#startup-overlay {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;

    z-index: 2000;
}

#startup-title {
    font-size: 20px;

    letter-spacing: 1px;

    text-shadow: 0 2px 8px rgba(0,0,0,0.6);

#startup-carousel {

    -ms-overflow-style: none;
}

#startup-carousel::-webkit-scrollbar {
    display: none;

.carousel-icon {

.carousel-name {

.carousel-stats {

.carousel-icon {
    width: 40px;
    height: 40px;
}

#news-ticker {

@keyframes tickerMove {

.chip-label {

.player-1 {

</style>
</head>

const TYPE_ICONS = {
    effect: "img/card/effect.png",
    fusion: "img/card/fusion.png",

    ritual: "img/card/ritual.png",

const newsStories = [
    "James stuns his way to a first-round victory in opening game",
    "Curtis dominates in an oppressive seven-duel win streak",
    "Counterfeit claims emerge in regard to recent flood of foil token cards",
    "Rumours swirl around odd aroma emanating from the mysterious cube",

function startNewsTicker() {
    if (!newsText) return;

    // pick a few random stories
    const shuffled = [...newsStories].sort(() => Math.random() - 0.5);
    const selected = shuffled.slice(0, 10); // how many stories you want

    // join them with a dot separator
    const combined = selected.join("   •   ");

    newsText.textContent = combined;

    newsTicker.classList.add("show");
}

function hideNewsTicker() {
    newsTicker.classList.remove("show");
}

let carouselOffset = 0;
const scrollSpeed = 1;


const carousel = document.getElementById("startup-carousel");
let carouselVisible = true;

carousel.addEventListener("scroll", () => {
    userIsScrolling = true;

    clearTimeout(resumeTimeout);
    resumeTimeout = setTimeout(() => {
        userIsScrolling = false;
        carouselOffset = carousel.scrollLeft; // sync position
    }, 1.2); // resume after 1.2s of inactivity
});

function getAllCardsFlat() {
    return Object.values(gameState).flat();
}

function getRandomCards(count = 25) {
    const pool = getAllCardsFlat();
    const copy = [...pool];

    const result = [];

    while (result.length < count && copy.length) {
        const i = Math.floor(Math.random() * copy.length);
        result.push(copy.splice(i, 1)[0]);
    }

    return result;
}

let userIsScrolling = false;
let resumeTimeout = null;
let carouselPaused = false;

function renderCarousel() {
    if (!carousel) return;

    const cards = getRandomCards(25);

    const fullList = [...cards, ...cards]; // duplicate for seamless loop

    carousel.innerHTML = "";

    fullList.forEach(card => {
        const item = document.createElement("div");
        item.className = "carousel-item";

        item.innerHTML = `
            <img class="carousel-icon"
                 src="${TYPE_ICONS[card.type] || ""}" />

            <div class="carousel-name">${card.name}</div>

            <div class="carousel-stats">
                Cost: ${card.cost} | Copies: ${card.copies}
            </div>
        `;

item.addEventListener("click", () => {
    carouselPaused = true;

    cardReactionDialogue(card);

    // resume after a short delay
    clearTimeout(window.carouselResumeTimer);
    window.carouselResumeTimer = setTimeout(() => {
        carouselPaused = false;
    }, 3500);
});

        carousel.appendChild(item);
    });
}


function animateCarousel() {
    if (carousel && !userIsScrolling && !carouselPaused) {
        carouselOffset += scrollSpeed;

        const maxScroll = carousel.scrollWidth - carousel.clientWidth;

        if (carouselOffset >= maxScroll) {
            carouselOffset = 0;
        }

        carousel.scrollLeft = carouselOffset;
    }

    requestAnimationFrame(animateCarousel);
}

/* =====================
   MUSIC
===================== */

const buySound = new Audio("music/buy.mp3");
buySound.volume = 0.5;

const music = new Audio("music/bg2.mp3");
music.loop = true;
music.volume = 0;

let musicPlaying = false;
let fadeInterval = null;

function fadeInMusic() {
    clearInterval(fadeInterval);
    music.play().catch(()=>{});
	
	    const pool = musicDialogue.on;
    const phrase = pool[Math.floor(Math.random() * pool.length)];
    typeText(phrase);

    fadeInterval = setInterval(() => {
        music.volume = Math.min(1, music.volume + 0.01);

        if (music.volume >= 1) {
            music.volume = 1;
            clearInterval(fadeInterval);
        }
    }, 50);
}

function fadeOutMusic() {
    clearInterval(fadeInterval);

    const pool = musicDialogue.off;
    const phrase = pool[Math.floor(Math.random() * pool.length)];
    typeText(phrase);

    fadeInterval = setInterval(() => {
        if (music.volume > 0.02) {
            music.volume -= 0.02;
        } else {
            music.volume = 0;
            music.pause();
            clearInterval(fadeInterval);
        }
    }, 50);
}

wrapper.addEventListener("click", () => {
    musicPlaying ? fadeOutMusic() : fadeInMusic();
    musicPlaying = !musicPlaying;
});

/* =====================
   DIALOGUE
===================== */
let typingInterval = null;
let isTyping = false;
let idleTimeout = null;
const IDLE_TIME = 5000;

function resetIdleTimer() {
    clearTimeout(idleTimeout);

    idleTimeout = setTimeout(() => {
        if (!isTyping) {
            hideDialogue();
        }
    }, IDLE_TIME);
}

function showTalking() {
    idle.style.display = "none";
    talking.style.display = "block";
}

function showIdle() {
    idle.style.display = "block";
    talking.style.display = "none";
}

function showDialogue() {
    dialogueBox.style.display = "block";
    requestAnimationFrame(() => dialogueBox.classList.add("show"));
}

function hideDialogue() {
    dialogueBox.classList.remove("show");
    setTimeout(()=>{ if(!isTyping) dialogueBox.style.display="none"; },250);
}

function typeText(text) {
    if (isTyping) {
        clearInterval(typingInterval);
        dialogueText.innerHTML = text;
        showIdle();
        isTyping = false;
        return;
    }

    dialogueText.innerHTML = "";
    showDialogue();
	resetIdleTimer();
    showTalking();
    isTyping = true;

    let i = 0;

    typingInterval = setInterval(() => {
        if (i < text.length) {
            dialogueText.innerHTML += text[i];

            if (text[i] !== " ") {
                const tick = new Audio("music/talk.mp3");
                tick.volume = 0.3;
                tick.play();
            }

            i++;
        } else {
            clearInterval(typingInterval);
            setTimeout(showIdle, 200);
            isTyping = false;
			resetIdleTimer();
        }
    }, 30);
}

		`Are you here to buy, or just waste my time? Grr...`
    ];

    const text = lines[Math.floor(Math.random() * lines.length)];

    typeText(text);
}

    if (card.copies <= 0) return;
    if (getCurrentPlayer().chips < card.cost) return;

    const player = getCurrentPlayer();
    setCounter(player.chips - card.cost);

    card.copies--;
    card.hasBeenBought = true;

if (!player.collection[key]) {
    player.collection[key] = 0;
}

player.collection[key]++;

    renderCards(category, category);
}

const counterDialogueExact = {
    0: ["Back to nothing, eh?"],

};

function handleCounterMilestone(oldValue, newValue, wasIncreasing) {
    // SPECIAL CASE: allow zero always when reached
    if (newValue === 0) {
        if (triggeredMilestones.has(0)) return;

        triggeredMilestones.add(0);

        const pool = counterDialogueExact[0];
        if (!pool) return;

        const phrase = pool[Math.floor(Math.random() * pool.length)];
        typeText(phrase);
        return;
    }

    // normal milestones only trigger on upward movement
    if (!wasIncreasing) return;

    if (!counterMilestones.has(newValue)) return;

    if (triggeredMilestones.has(newValue)) return;
    triggeredMilestones.add(newValue);

    const pool = counterDialogueExact[newValue];
    if (!pool) return;

    const phrase = pool[Math.floor(Math.random() * pool.length)];
    typeText(phrase);
}



/* =====================
   SWIPE COUNTER (STEP SYSTEM - FIXED)
===================== */
let previousCounter = 0;
const counterValue = document.getElementById("counter-value");

function getCurrentPlayer() {
    return players[currentPlayerIndex];
}

function updatePlayerTheme() {
    const playerNum = currentPlayerIndex + 1;

    const isPlayer1 = playerNum === 1;

    const colorClass = isPlayer1 ? "player-1" : "player-2";

    // elements
    const playerLabel = document.getElementById("player-label");
    const chipLabel = document.getElementById("chip-toggle");
    const counter = document.getElementById("counter-value");

    // reset old classes
    playerLabel.classList.remove("player-1", "player-2");
    chipLabel.classList.remove("player-1", "player-2");
    counter.classList.remove("player-1", "player-2");

    // apply new class
    playerLabel.classList.add(colorClass);
    chipLabel.classList.add(colorClass);
    counter.classList.add(colorClass);
}

function setCounter(val) {
    const player = getCurrentPlayer();

    const newValue = Math.max(0, Math.min(val, 999));

    if (newValue === player.chips) return;

    const wasIncreasing = newValue > player.chips;

    previousCounter = player.chips;
    player.chips = newValue;

    counterValue.textContent = player.chips;

    handleCounterMilestone(previousCounter, player.chips, wasIncreasing);
}

/* --- STEP-BASED SWIPE SYSTEM --- */
let isDragging = false;
let lastX = 0;
let accumulated = 0;
let velocity = 0;

const STEP_SIZE = 12;
const INERTIA_FRICTION = 0.02;

/* POINTER DOWN */
counterValue.addEventListener("pointerdown", (e) => {
    isDragging = true;
    lastX = e.clientX;
    accumulated = 0;
    velocity = 0;

    counterValue.setPointerCapture(e.pointerId);
});

/* POINTER MOVE */
counterValue.addEventListener("pointermove", (e) => {
    if (!isDragging) return;

    const dx = lastX - e.clientX;
    lastX = e.clientX;

    accumulated += dx;
    velocity = dx;

    while (Math.abs(accumulated) >= STEP_SIZE) {
        const step = Math.sign(accumulated);
        setCounter(getCurrentPlayer().chips + step);
        accumulated -= STEP_SIZE * step;
    }
});

/* POINTER UP */
counterValue.addEventListener("pointerup", () => {
    isDragging = false;
    applyInertia();
});

counterValue.addEventListener("pointercancel", () => {
    isDragging = false;
});

/* INERTIA */
function applyInertia() {
    let v = velocity;

    function step() {
        if (Math.abs(v) < 0.5) return;

        accumulated += v;

        while (Math.abs(accumulated) >= STEP_SIZE) {
            const stepVal = Math.sign(accumulated);
            setCounter(getCurrentPlayer().chips + stepVal);
            accumulated -= STEP_SIZE * stepVal;
        }

        v *= INERTIA_FRICTION;

        requestAnimationFrame(step);
    }

    step();
}
